name: Auto Deploy to AWS (GHCR)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bailuo-xisi/sigora-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/Sigora-api

            git fetch origin main
            git reset --hard origin/main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/bailuo-xisi/sigora-api:latest
            docker image inspect ghcr.io/bailuo-xisi/sigora-api:latest --format 'Pulled image: {{index .RepoDigests 0}}'
            docker-compose pull new-api || true
            docker-compose up -d --force-recreate

            healthy=false
            for attempt in $(seq 1 24); do
              if [ "$(docker inspect --format '{{.State.Health.Status}}' new-api 2>/dev/null)" = "healthy" ]; then
                echo "Deployment healthy"
                healthy=true
                break
              fi
              echo "Waiting for service health ($attempt/24)"
              sleep 5
            done

            if [ "$healthy" != "true" ]; then
              docker-compose ps
              docker-compose logs --tail=200 new-api
              exit 1
            fi

            docker image prune -f
